<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPwap — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --bg2: #161b26; --border: #2a3347;
      --text: #e8eaf0; --text2: #8b95a8;
      --green: #25d366; --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 48px; height: 48px;
      background: var(--green);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #000;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--green); }
    button {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 14px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .9; }
    .error {
      background: #450a0a;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">W</div>
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresá a tu cuenta de SPwap</p>

    {% if form.errors %}
    <div class="error">Usuario o contraseña incorrectos.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Usuario</label>
      <input type="text" name="username" autofocus placeholder="tu_usuario">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••">
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>
